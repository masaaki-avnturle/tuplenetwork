<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&amp;display=swap');

      .bg { fill: #04060a; }
      .grid-line { stroke: rgba(74,128,208,0.06); stroke-width: 0.8; }

      /* Knot paths */
      .knot1 { fill: none; stroke: rgba(74,128,208,0.18); stroke-width: 1; }
      .knot2 { fill: none; stroke: rgba(200,164,74,0.15); stroke-width: 1; }
      .knot3 { fill: none; stroke: rgba(64,184,192,0.13); stroke-width: 1; }

      /* Particles */
      .p-blue  { fill: rgba(74,128,208,0.55); }
      .p-gold  { fill: rgba(200,164,74,0.55); }
      .p-teal  { fill: rgba(64,184,192,0.55); }

      /* Text */
      .lbl  { font-family: 'JetBrains Mono', monospace; font-size: 9px;
               letter-spacing: 4px; fill: rgba(64,184,192,0.7); text-transform: uppercase; }
      .name { font-family: Georgia, serif; font-size: 52px; font-weight: 700;
               fill: #d8e4f8; letter-spacing: -1px; }
      .name-ja { font-family: serif; font-size: 20px;
                  fill: #c8a44a; letter-spacing: 8px; }
      .eq   { font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
               fill: rgba(106,160,240,0.8); letter-spacing: 0.5px; }
      .eq2  { font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
               fill: rgba(200,164,74,0.75); }
      .eq3  { font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
               fill: rgba(64,184,192,0.75); }
      .bar  { fill: none; stroke: rgba(74,128,208,0.35); stroke-width: 1; }
      .bar-accent { fill: none; stroke-width: 2;
                    stroke: url(#grad-line); }
      .tag  { font-family: 'JetBrains Mono', monospace; font-size: 8px;
               letter-spacing: 1.5px; text-transform: uppercase; }
      .tag-box-b { fill: rgba(74,128,208,0.1); stroke: rgba(74,128,208,0.4); stroke-width: 0.8; rx: 2; }
      .tag-box-g { fill: rgba(200,164,74,0.1); stroke: rgba(200,164,74,0.4); stroke-width: 0.8; }
      .tag-box-t { fill: rgba(64,184,192,0.1); stroke: rgba(64,184,192,0.4); stroke-width: 0.8; }

      /* Animations */
      .fade-in-1 { animation: fadeUp 0.9s 0.1s both; }
      .fade-in-2 { animation: fadeUp 0.9s 0.3s both; }
      .fade-in-3 { animation: fadeUp 0.9s 0.5s both; }
      .fade-in-4 { animation: fadeUp 0.9s 0.7s both; }
      .fade-in-5 { animation: fadeUp 0.9s 0.9s both; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Knot rotation */
      .knot-wrap1 { transform-origin: 200px 140px; animation: rotK1 18s linear infinite; }
      .knot-wrap2 { transform-origin: 680px 100px; animation: rotK2 24s linear infinite; }
      .knot-wrap3 { transform-origin: 820px 200px; animation: rotK3 30s linear infinite reverse; }
      @keyframes rotK1 { to { transform: rotate(360deg); } }
      @keyframes rotK2 { to { transform: rotate(360deg); } }
      @keyframes rotK3 { to { transform: rotate(360deg); } }

      /* Particle float */
      .pf1 { animation: pfloat1 6s ease-in-out infinite; }
      .pf2 { animation: pfloat2 8s ease-in-out infinite; }
      .pf3 { animation: pfloat3 5s ease-in-out infinite; }
      .pf4 { animation: pfloat1 9s ease-in-out infinite reverse; }
      .pf5 { animation: pfloat2 7s ease-in-out infinite reverse; }
      @keyframes pfloat1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes pfloat2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
      @keyframes pfloat3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

      /* Line pulse */
      .line-pulse { stroke-dasharray: 6 8; animation: dashMove 3s linear infinite; }
      @keyframes dashMove { to { stroke-dashoffset: -28; } }

      /* Accent bar animate */
      .acc-bar { stroke-dasharray: 320; stroke-dashoffset: 320;
                  animation: drawBar 1.2s 0.6s ease forwards; }
      @keyframes drawBar { to { stroke-dashoffset: 0; } }

      /* Glow pulse on name */
      .name-glow { animation: glowPulse 4s ease-in-out infinite; }
      @keyframes glowPulse {
        0%,100% { filter: drop-shadow(0 0 8px rgba(74,128,208,0.3)); }
        50%      { filter: drop-shadow(0 0 18px rgba(74,128,208,0.6)); }
      }

      /* Equation scroll ticker */
      .ticker-wrap { overflow: hidden; }
      .ticker-text { animation: tickerScroll 22s linear infinite; }
      @keyframes tickerScroll {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
    </style>

    <linearGradient id="grad-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4a80d0" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#4a80d0"/>
      <stop offset="70%"  stop-color="#40b8c0"/>
      <stop offset="100%" stop-color="#40b8c0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="grad-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c8a44a" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#c8a44a" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="280"/>

  <!-- Grid lines -->
  <g opacity="0.6">
    <line class="grid-line" x1="0" y1="40"  x2="900" y2="40"/>
    <line class="grid-line" x1="0" y1="80"  x2="900" y2="80"/>
    <line class="grid-line" x1="0" y1="120" x2="900" y2="120"/>
    <line class="grid-line" x1="0" y1="160" x2="900" y2="160"/>
    <line class="grid-line" x1="0" y1="200" x2="900" y2="200"/>
    <line class="grid-line" x1="0" y1="240" x2="900" y2="240"/>
    <line class="grid-line" x1="100" y1="0" x2="100" y2="280"/>
    <line class="grid-line" x1="200" y1="0" x2="200" y2="280"/>
    <line class="grid-line" x1="300" y1="0" x2="300" y2="280"/>
    <line class="grid-line" x1="400" y1="0" x2="400" y2="280"/>
    <line class="grid-line" x1="500" y1="0" x2="500" y2="280"/>
    <line class="grid-line" x1="600" y1="0" x2="600" y2="280"/>
    <line class="grid-line" x1="700" y1="0" x2="700" y2="280"/>
    <line class="grid-line" x1="800" y1="0" x2="800" y2="280"/>
  </g>

  <!-- Knot curves (torus knot approximations via path) -->
  <g class="knot-wrap1">
    <path class="knot1" d="M200,80 C230,50 270,50 280,80 C290,110 260,140 230,130 C200,120 180,90 200,80Z"/>
    <path class="knot1" d="M160,140 C175,100 215,95 225,125 C235,155 205,175 180,165 C155,155 145,180 160,140Z"/>
    <circle cx="200" cy="140" r="55" fill="none" stroke="rgba(74,128,208,0.08)" stroke-width="1"/>
  </g>
  <g class="knot-wrap2">
    <path class="knot2" d="M680,60 C710,35 745,38 750,65 C755,92 730,112 705,100 C680,88 650,85 680,60Z"/>
    <path class="knot2" d="M645,105 C660,75 695,72 700,98 C705,124 678,138 655,128 C632,118 630,135 645,105Z"/>
    <circle cx="680" cy="100" r="48" fill="none" stroke="rgba(200,164,74,0.07)" stroke-width="1"/>
  </g>
  <g class="knot-wrap3">
    <path class="knot3" d="M820,165 C848,142 876,147 878,170 C880,193 855,208 834,198 C813,188 792,188 820,165Z"/>
    <circle cx="820" cy="190" r="40" fill="none" stroke="rgba(64,184,192,0.07)" stroke-width="1"/>
  </g>

  <!-- Floating particles -->
  <g>
    <circle class="p-blue pf1" cx="55"  cy="55"  r="1.8"/>
    <circle class="p-gold pf2" cx="380" cy="35"  r="1.5"/>
    <circle class="p-teal pf3" cx="550" cy="250" r="2.0"/>
    <circle class="p-blue pf4" cx="760" cy="60"  r="1.6"/>
    <circle class="p-gold pf5" cx="840" cy="240" r="1.4"/>
    <circle class="p-teal pf1" cx="130" cy="240" r="1.7"/>
    <circle class="p-blue pf3" cx="440" cy="265" r="1.5"/>
    <circle class="p-gold pf2" cx="620" cy="250" r="1.6"/>

    <!-- Connection lines between particles -->
    <line class="line-pulse" x1="55" y1="55" x2="130" y2="240"
          stroke="rgba(74,128,208,0.12)" stroke-width="0.7"/>
    <line class="line-pulse" x1="380" y1="35" x2="440" y2="265"
          stroke="rgba(200,164,74,0.10)" stroke-width="0.7"/>
    <line class="line-pulse" x1="550" y1="250" x2="620" y2="250"
          stroke="rgba(64,184,192,0.12)" stroke-width="0.7"/>
  </g>

  <!-- Top accent line -->
  <line class="bar-accent acc-bar" x1="40" y1="8" x2="860" y2="8"/>

  <!-- Eyebrow label -->
  <g class="fade-in-1">
    <line x1="40" y1="42" x2="66" y2="42" stroke="rgba(64,184,192,0.7)" stroke-width="1"/>
    <text class="lbl" x="74" y="46">Global Differential Manifold Research</text>
  </g>

  <!-- Name -->
  <g class="fade-in-2 name-glow">
    <text class="name" x="40" y="110">Masaaki Yamaguchi</text>
  </g>

  <!-- Japanese name -->
  <g class="fade-in-3">
    <text class="name-ja" x="43" y="140">山口 雅旭</text>
  </g>

  <!-- Divider -->
  <line class="fade-in-3" x1="40" y1="155" x2="560" y2="155"
        stroke="rgba(80,120,200,0.18)" stroke-width="0.8"/>

  <!-- Core equations (3 lines) -->
  <g class="fade-in-4">
    <text class="eq"  x="40" y="174">β(p,q) = Γ(p)Γ(q)/Γ(p+q)   ·   ζ(s) = β(p,q)/log x = x·log x</text>
    <text class="eq2" x="40" y="193">d/df F = ∬1/(x·log x)² dx_m + ∬1/(y·log y)^½ dy_m = Γ(x,y)</text>
    <text class="eq3" x="40" y="212">⊕(iℏ∇)^⊕L = e^{-x·log x}   ·   π(χ,x) = [iπ(χ,x), f(x)]</text>
  </g>

  <!-- Tags row -->
  <g class="fade-in-5">
    <!-- Jones Polynomial -->
    <rect x="40"  y="228" width="118" height="17" rx="2" class="tag-box-b"/>
    <text class="tag" x="50"  y="240" fill="rgba(106,160,240,0.9)">Jones Polynomial</text>

    <!-- Gamma Beta Zeta -->
    <rect x="166" y="228" width="116" height="17" rx="2" class="tag-box-g"/>
    <text class="tag" x="176" y="240" fill="rgba(200,164,74,0.9)">Gamma · Beta · Zeta</text>

    <!-- Shannon Entropy -->
    <rect x="290" y="228" width="110" height="17" rx="2" class="tag-box-t"/>
    <text class="tag" x="300" y="240" fill="rgba(64,184,192,0.9)">Shannon Entropy</text>

    <!-- Bada Language -->
    <rect x="408" y="228" width="90"  height="17" rx="2" class="tag-box-b"/>
    <text class="tag" x="418" y="240" fill="rgba(106,160,240,0.9)">Bada Language</text>

    <!-- TupleSpace AI -->
    <rect x="506" y="228" width="90"  height="17" rx="2" class="tag-box-g"/>
    <text class="tag" x="516" y="240" fill="rgba(200,164,74,0.9)">TupleSpace AI</text>

    <!-- AdS5 Manifold -->
    <rect x="604" y="228" width="90"  height="17" rx="2" class="tag-box-t"/>
    <text class="tag" x="614" y="240" fill="rgba(64,184,192,0.9)">AdS5 Manifold</text>
  </g>

  <!-- Bottom equation ticker -->
  <g class="fade-in-5">
    <rect x="0" y="260" width="900" height="20" fill="rgba(8,12,24,0.9)"/>
    <line x1="0" y1="260" x2="900" y2="260" stroke="rgba(80,120,200,0.15)" stroke-width="0.8"/>
    <!-- Clipping -->
    <clipPath id="ticker-clip">
      <rect x="40" y="260" width="820" height="20"/>
    </clipPath>
    <g clip-path="url(#ticker-clip)">
      <text class="ticker-text" y="274"
            font-family="'JetBrains Mono',monospace" font-size="9"
            fill="rgba(74,128,208,0.45)" letter-spacing="1">
        <tspan>ζ(s) = x·log x   ·   β(p,q)/Γ(p+q)   ·   □ = 2(sin + cos)(ix·log x)   ·   ‖ds²‖ = e^{-2πT‖ψ‖}[η+h̄]dxdx   ·   HΨ = ⊕(iℏ∇)^⊕L   ·   π(χ,x) = [iπ, f(x)]   ·   Ω::DATABASE ↔ ∞   ·   </tspan>
        <tspan>ζ(s) = x·log x   ·   β(p,q)/Γ(p+q)   ·   □ = 2(sin + cos)(ix·log x)   ·   ‖ds²‖ = e^{-2πT‖ψ‖}[η+h̄]dxdx   ·   HΨ = ⊕(iℏ∇)^⊕L   ·   π(χ,x) = [iπ, f(x)]   ·   Ω::DATABASE ↔ ∞   ·   </tspan>
      </text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <line x1="40" y1="258" x2="860" y2="258"
        stroke="url(#grad-gold)" stroke-width="0.6" opacity="0.5"/>
</svg>
